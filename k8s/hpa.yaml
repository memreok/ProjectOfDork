apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dork-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dork-backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # CPU yükü %50'yi geçerse otomatik ölçeklendir
